name: Auto-fix CodeRabbit Review

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  fix-coderabbit:
    if: >-
      ${{
        github.event.review.user.type == 'Bot' &&
        contains(fromJSON('["coderabbitai[bot]"]'), github.event.review.user.login)
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Collect all CodeRabbit feedback on this PR
        id: feedback
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const review = context.payload.review;

            // Inline review comments (on specific lines)
            const { data: inlineComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const coderabbitInline = inlineComments
              .filter(c => c.user.login.includes('coderabbit'))
              .map(c => `📍 ${c.path} (line ${c.line || c.original_line}):\n${c.body}`)
              .join('\n\n---\n\n');

            const summary = review.body || '(no summary)';
            const combined = [
              'REVIEW SUMMARY:',
              summary,
              '',
              'INLINE COMMENTS:',
              coderabbitInline || '(none)',
            ].join('\n');

            core.setOutput('feedback', combined);
            core.info('Feedback collected:\n' + combined.substring(0, 800));

      - name: Fix issues and post review with Claude
        uses: anthropics/claude-code-action@4eaab9b1bbfbbf62abf34216270d6002ab02915c # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            CodeRabbit reviewed this PR and left the feedback below. Do the following two things in order:

            STEP 1 — FIX ALL ISSUES:
            ${{ steps.feedback.outputs.feedback }}

            Rules for fixing:
            - Fix every issue CodeRabbit flagged — do not skip any
            - Only touch what CodeRabbit flagged — do not change unrelated code
            - No `any` types; use `unknown` + narrowing instead
            - All functions need explicit return types
            - No inline styles in React Native components
            - Run `npx tsc --noEmit` to confirm no TypeScript errors after your changes
            - Commit your fixes with the message: "fix: address CodeRabbit review comments"

            STEP 2 — POST A PR COMMENT:
            After committing the fixes, post a comment on this PR with the following sections:

            **🔧 What I fixed**
            A bullet list of every CodeRabbit issue you fixed and exactly what you changed.

            **🔍 Additional observations**
            Any other issues you noticed in the changed files that CodeRabbit did not flag — bugs, type safety gaps, missing error handling, accessibility issues, etc. Be specific (file + line).

            **✅ Status**
            Confirm that `npx tsc --noEmit` passed and the fixes are committed.
          claude_args: --max-turns 30
