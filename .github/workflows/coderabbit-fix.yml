name: Auto-fix CodeRabbit Review

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  fix-coderabbit:
    # Run when CodeRabbit flags issues (not when it approves — that's handled by coderabbit-approved.yml)
    if: >-
      ${{
        github.event.review.user.type == 'Bot' &&
        contains(fromJSON('["coderabbitai[bot]"]'), github.event.review.user.login) &&
        github.event.review.state != 'approved'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Collect all CodeRabbit feedback on this PR
        id: feedback
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const review = context.payload.review;

            const { data: inlineComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const coderabbitInline = inlineComments
              .filter(c => c.user.login.includes('coderabbit'))
              .map(c => `📍 ${c.path} (line ${c.line || c.original_line}):\n${c.body}`)
              .join('\n\n---\n\n');

            const summary = review.body || '(no summary)';
            const combined = [
              'REVIEW SUMMARY:',
              summary,
              '',
              'INLINE COMMENTS:',
              coderabbitInline || '(none)',
            ].join('\n');

            core.setOutput('feedback', combined);

      - name: Fix issues with Claude
        uses: anthropics/claude-code-action@4eaab9b1bbfbbf62abf34216270d6002ab02915c # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            CodeRabbit reviewed this PR and flagged the issues below. Fix every one of them silently.

            ${{ steps.feedback.outputs.feedback }}

            Rules:
            - Fix every issue CodeRabbit flagged — do not skip any
            - Only touch what CodeRabbit flagged — do not change unrelated code
            - No `any` types; use `unknown` + narrowing instead
            - All functions need explicit return types
            - No inline styles in React Native components
            - Run `npx tsc --noEmit` to confirm no TypeScript errors after your changes
            - Commit with message: "fix: address CodeRabbit review comments"
            - Do NOT post any PR comment — stay silent, just fix and commit
          claude_args: --max-turns 30
