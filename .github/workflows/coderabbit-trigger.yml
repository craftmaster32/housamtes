name: Trigger CodeRabbit Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  trigger-review:
    # Don't re-trigger if the push came from the Claude bot (it would loop before CodeRabbit can respond)
    if: github.actor != 'claude[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Post @coderabbitai full review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@coderabbitai full review',
            });
