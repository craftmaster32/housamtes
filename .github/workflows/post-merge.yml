name: Post-merge checks and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        id: tsc
        run: npx tsc --noEmit

      - name: Lint
        id: lint
        run: npm run lint

      - name: Tests
        id: test
        run: npm test -- --passWithNoTests

      # Only touch the database when this push actually changed a migration.
      # Frontend-only changes then skip migrate entirely, so a flaky Supabase
      # management API can never block an unrelated UI deploy.
      - name: Detect migration changes
        id: migrations
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^supabase/migrations/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Same idea for Edge Functions: only redeploy them when a function
      # actually changed, so UI-only merges never touch Supabase.
      - name: Detect function changes
        id: functions
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^supabase/functions/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Apply database migrations BEFORE deploying, so the deployed app never
      # runs against a database that is missing a column it expects.
      - name: Setup Supabase CLI
        if: success() && (steps.migrations.outputs.changed == 'true' || steps.functions.outputs.changed == 'true')
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: '2.15.8'

      - name: Apply database migrations
        if: success() && steps.migrations.outputs.changed == 'true'
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # Deploy ONLY the Edge Functions that changed in this merge, each with the
      # verify_jwt setting that matches how it is called (getting this wrong
      # breaks the function):
      #   OFF — cron-triggered (bill-due-reminder, grocery-reminder-check,
      #         parking-check) and the NFC parking shortcut (parking-toggle),
      #         none of which send a Supabase user token.
      #   ON  — app-facing functions (delete-account, send-push,
      #         spending-analysis); each also re-verifies the JWT in code.
      # Deploying only what changed keeps the sensitive cron/NFC functions
      # untouched unless they themselves are edited.
      - name: Deploy edge functions
        if: success() && steps.functions.outputs.changed == 'true'
        run: |
          set -euo pipefail
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          changed=$(git diff --name-only HEAD^ HEAD | grep '^supabase/functions/' | cut -d/ -f3 | sort -u)
          for fn in $changed; do
            # A deleted function still appears in the diff — skip it so we never
            # try to deploy a directory that no longer exists (which would fail
            # the run before Vercel deploys).
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "Skipping $fn (removed)"
              continue
            fi
            case "$fn" in
              bill-due-reminder|grocery-reminder-check|parking-check|parking-toggle)
                echo "Deploying $fn (verify_jwt OFF)"
                supabase functions deploy "$fn" --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
                ;;
              *)
                echo "Deploying $fn (verify_jwt ON)"
                supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
                ;;
            esac
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Install Vercel CLI
        if: success()
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
          EXPO_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.EXPO_PUBLIC_VAPID_PUBLIC_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: npm run deploy

      - name: Auto-fix on failure
        if: steps.tsc.outcome == 'failure' || steps.lint.outcome == 'failure' || steps.test.outcome == 'failure'
        uses: anthropics/claude-code-action@4eaab9b1bbfbbf62abf34216270d6002ab02915c # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The post-merge checks failed on main. Investigate and fix everything.

            Run these to find what is broken:
            - `npx tsc --noEmit` for TypeScript errors
            - `npm run lint` for lint errors
            - `npm test -- --passWithNoTests` for test failures

            Then:
            1. Create a new branch: `fix/post-merge-$(date +%Y%m%d%H%M)`
            2. Fix every failure — no skipping, no `any` types, no inline styles, explicit return types
            3. Confirm all three checks pass before committing
            4. Commit with message: "fix: resolve post-merge check failures"
            5. Push the branch and open a PR titled "fix: post-merge check failures"

            Follow all rules in CLAUDE.md strictly.
          claude_args: --max-turns 20
