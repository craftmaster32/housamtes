name: Claude Final Review on CodeRabbit Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  final-review:
    if: >-
      ${{
        github.event.review.user.type == 'Bot' &&
        contains(fromJSON('["coderabbitai[bot]"]'), github.event.review.user.login) &&
        github.event.review.commit_id == github.event.pull_request.head.sha
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Check if CodeRabbit has no more issues
        id: check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const body = context.payload.review.body || '';
            const isClean = !(/Actionable comments posted: [1-9]\d*/.test(body));
            core.setOutput('is_clean', isClean.toString());
            core.info(`CodeRabbit satisfied: ${isClean}`);

      - name: Check if full review has already been requested
        id: state
        if: steps.check.outputs.is_clean == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const hasLabel = labels.some(l => l.name === 'coderabbit-full-reviewed');
            core.setOutput('full_review_done', hasLabel.toString());
            core.info(`Full review already requested: ${hasLabel}`);

      - name: Request full CodeRabbit review
        if: steps.check.outputs.is_clean == 'true' && steps.state.outputs.full_review_done == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            // Ensure the tracking label exists in the repo
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'coderabbit-full-reviewed',
                color: '0075ca',
                description: 'Full CodeRabbit review requested for this PR',
              });
            } catch (e) {
              // Label already exists, that is fine
            }
            // Mark this PR so the next clean review triggers safe-to-merge
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['coderabbit-full-reviewed'],
            });
            // Trigger the full review
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '@coderabbitai review',
            });
            core.info('Full CodeRabbit review requested — waiting for result');

      - name: Checkout PR branch
        if: steps.check.outputs.is_clean == 'true' && steps.state.outputs.full_review_done == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Claude final review
        if: steps.check.outputs.is_clean == 'true' && steps.state.outputs.full_review_done == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        uses: anthropics/claude-code-action@4eaab9b1bbfbbf62abf34216270d6002ab02915c # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: "true"
          prompt: |
            CodeRabbit has completed a full review of this PR and found no more issues.
            The incremental fix loop and full review are both clean.

            Do a final independent review of all the changed files in this PR.
            Run: git diff origin/main...HEAD
            Look at the diff carefully — think of yourself as a senior reviewer seeing this code for the first time.

            Then post a PR comment using this bash command:
            gh pr comment $PR_NUMBER --body "<your full review here>"

            The comment body must include these three sections:

            **✅ CodeRabbit full review approved**

            **🔍 Claude's final review**
            Any bugs, type safety gaps, edge cases, missing error handling, accessibility issues,
            or security problems you notice in the changed files. Be specific (file + line).
            If everything looks clean, say so clearly.

            **🚀 Ready to merge**
            One sentence confirming the PR is good to go, or flagging if something needs attention first.
          claude_args: --max-turns 5

      - name: Remove full-review label
        if: steps.check.outputs.is_clean == 'true' && steps.state.outputs.full_review_done == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'coderabbit-full-reviewed',
              });
            } catch (e) {
              // Already removed, no problem
            }
