name: Claude Final Review on CodeRabbit Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  final-review:
    # Only run when CodeRabbit approves — this is the signal that the loop is done
    if: >-
      ${{
        github.event.review.user.type == 'Bot' &&
        contains(fromJSON('["coderabbitai[bot]"]'), github.event.review.user.login) &&
        github.event.review.state == 'approved'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Post Claude final review
        uses: anthropics/claude-code-action@4eaab9b1bbfbbf62abf34216270d6002ab02915c # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            CodeRabbit has approved this PR. The automated fix loop is complete.

            Now do a final independent review of all the changed files in this PR.
            Look at the diff carefully — think of yourself as a senior reviewer seeing this code for the first time.

            Post a PR comment with these sections:

            **✅ CodeRabbit approved**

            **🔍 Claude's final review**
            Any bugs, type safety gaps, edge cases, missing error handling, accessibility issues,
            or security problems you notice in the changed files. Be specific (file + line).
            If everything looks clean, say so clearly.

            **🚀 Ready to merge**
            One sentence confirming the PR is good to go, or flagging if something needs attention first.
          claude_args: --max-turns 5
