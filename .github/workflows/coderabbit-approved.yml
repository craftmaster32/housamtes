name: Claude Final Review on CodeRabbit Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  final-review:
    if: >-
      ${{
        github.event.review.user.type == 'Bot' &&
        contains(fromJSON('["coderabbitai[bot]"]'), github.event.review.user.login) &&
        github.event.review.commit_id == github.event.pull_request.head.sha
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Check if CodeRabbit has no more issues
        id: check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const body = context.payload.review.body || '';
            const isClean = !(/Actionable comments posted: [1-9]\d*/.test(body));
            core.setOutput('is_clean', isClean.toString());
            core.info(`CodeRabbit satisfied: ${isClean}`);

      - name: Checkout PR branch
        if: steps.check.outputs.is_clean == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Post Claude final review
        if: steps.check.outputs.is_clean == 'true'
        uses: anthropics/claude-code-action@4eaab9b1bbfbbf62abf34216270d6002ab02915c # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: coderabbitai[bot]
          prompt: |
            CodeRabbit has reviewed this PR and found no more issues. The automated fix loop is complete.

            Now do a final independent review of all the changed files in this PR.
            Look at the diff carefully — think of yourself as a senior reviewer seeing this code for the first time.

            Post a PR comment with these sections:

            **✅ CodeRabbit approved**

            **🔍 Claude's final review**
            Any bugs, type safety gaps, edge cases, missing error handling, accessibility issues,
            or security problems you notice in the changed files. Be specific (file + line).
            If everything looks clean, say so clearly.

            **🚀 Ready to merge**
            One sentence confirming the PR is good to go, or flagging if something needs attention first.
          claude_args: --max-turns 5
