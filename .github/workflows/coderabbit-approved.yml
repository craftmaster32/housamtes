name: Claude Final Review on CodeRabbit Approval

on:
  status:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  final-review:
    # Only run when CodeRabbit sets a success status on a commit
    if: >-
      ${{
        github.event.context == 'CodeRabbit' &&
        github.event.state == 'success'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Find open PR for this commit
        id: pr
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            // listPullRequestsAssociatedWithCommit only works for merged commits.
            // List all open PRs and match by head SHA instead.
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const openPR = prs.find(pr => pr.head.sha === context.payload.sha);
            if (!openPR) {
              core.info(`No open PR with head SHA ${context.payload.sha} — skipping`);
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            core.setOutput('number', openPR.number.toString());
            core.setOutput('head_sha', openPR.head.sha);
            core.setOutput('head_ref', openPR.head.ref);
            core.info(`Found PR #${openPR.number}`);

      - name: Check if CodeRabbit approved (no fresh issues)
        id: check
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');

            // Get the commit's authored date — only look at CodeRabbit comments after this push
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.sha,
            });
            const commitDate = new Date(commit.commit.author.date);
            core.info(`Commit date: ${commitDate.toISOString()}`);

            // Look for any CodeRabbit issue comment posted after this commit
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 50,
              sort: 'created',
              direction: 'desc',
            });

            const freshIssues = comments.find(c =>
              c.user.login === 'coderabbitai[bot]' &&
              new Date(c.created_at) >= commitDate &&
              /Actionable comments posted: [1-9]\d*/.test(c.body)
            );

            const isClean = !freshIssues;
            core.setOutput('is_clean', isClean.toString());
            core.info(`CodeRabbit approved (no fresh issues): ${isClean}`);

      - name: Check full-review label state
        id: state
        if: steps.pr.outputs.found == 'true' && steps.check.outputs.is_clean == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const hasLabel = labels.some(l => l.name === 'coderabbit-full-reviewed');

            if (!hasLabel) {
              core.setOutput('full_review_done', 'false');
              core.info('Full review not yet requested');
              return;
            }

            // Label is present — but only proceed to step 2 if this status event
            // was created AFTER we posted the '@coderabbitai review' comment.
            // Without this check, a stale status event from step 1 triggers step 2
            // immediately before CodeRabbit has had time to do the full review.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 50,
              sort: 'created',
              direction: 'desc',
            });

            const reviewRequest = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.trim() === '@coderabbitai review'
            );

            if (reviewRequest) {
              const requestTime = new Date(reviewRequest.created_at);
              const statusTime = new Date(context.payload.created_at);
              if (statusTime <= requestTime) {
                core.info(`Status (${statusTime.toISOString()}) predates review request (${requestTime.toISOString()}) — waiting for CodeRabbit to finish`);
                core.setOutput('full_review_done', 'waiting');
                return;
              }
            }

            core.setOutput('full_review_done', 'true');
            core.info('Full review done and status is fresh');

      # ── Step 1: First clean review ────────────────────────────────────────
      # Mark the PR and request a thorough full review from CodeRabbit
      - name: Request full CodeRabbit review
        if: >-
          ${{
            steps.pr.outputs.found == 'true' &&
            steps.check.outputs.is_clean == 'true' &&
            steps.state.outputs.full_review_done == 'false'
          }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'coderabbit-full-reviewed',
                color: '0075ca',
                description: 'Full CodeRabbit review requested for this PR',
              });
            } catch (e) {
              // Label already exists
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['coderabbit-full-reviewed'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '@coderabbitai review',
            });
            core.info('Full CodeRabbit review requested — waiting for result');

      # ── Step 2: Full review also clean ───────────────────────────────────
      # Call Anthropic API directly — claude-code-action rejects status events,
      # and GITHUB_TOKEN cannot trigger a second workflow via issue_comment.
      - name: Checkout PR branch
        if: >-
          ${{
            steps.pr.outputs.found == 'true' &&
            steps.check.outputs.is_clean == 'true' &&
            steps.state.outputs.full_review_done == 'true'
          }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Claude final review
        if: >-
          ${{
            steps.pr.outputs.found == 'true' &&
            steps.check.outputs.is_clean == 'true' &&
            steps.state.outputs.full_review_done == 'true'
          }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { execSync } = require('child_process');
            const https = require('https');
            const prNumber = parseInt(process.env.PR_NUMBER);

            // Get the full diff against main
            let diff;
            try {
              diff = execSync('git diff origin/main...HEAD', { maxBuffer: 500_000 }).toString();
            } catch (e) {
              diff = '(could not retrieve diff)';
            }
            if (diff.length > 30000) diff = diff.slice(0, 30000) + '\n... (diff truncated)';

            const prompt = [
              'CodeRabbit has completed a full review of this PR and found no issues. Perform a final independent code review.',
              '',
              'Diff (all files changed vs main):',
              '```',
              diff,
              '```',
              '',
              'Write a PR comment with exactly these three sections:',
              '',
              '**✅ CodeRabbit full review approved**',
              '',
              '**🔍 Claude\'s final review**',
              'Note any bugs, type safety gaps, edge cases, missing error handling, accessibility or security problems. Be specific (file + line). If everything looks clean, say so clearly.',
              '',
              '**🚀 Ready to merge**',
              'One sentence confirming the PR is good to go, or flagging if something needs attention first.',
            ].join('\n');

            // Call Anthropic API
            const responseBody = await new Promise((resolve, reject) => {
              const body = JSON.stringify({
                model: 'claude-opus-4-8',
                max_tokens: 1500,
                messages: [{ role: 'user', content: prompt }],
              });

              const req = https.request({
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
                  'content-length': Buffer.byteLength(body),
                },
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });

            const review = responseBody?.content?.[0]?.text;
            if (!review) {
              core.setFailed(`Anthropic API error: ${JSON.stringify(responseBody)}`);
              return;
            }

            // Post the review as a PR comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: review,
            });
            core.info('Claude final review posted');

      - name: Remove full-review label
        if: >-
          ${{
            steps.pr.outputs.found == 'true' &&
            steps.check.outputs.is_clean == 'true' &&
            steps.state.outputs.full_review_done == 'true'
          }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt('${{ steps.pr.outputs.number }}'),
                name: 'coderabbit-full-reviewed',
              });
            } catch (e) {
              // Already removed, no problem
            }
