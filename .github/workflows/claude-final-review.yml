name: Claude Final Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    # Only run on the specific automated trigger comment (not general @claude mentions).
    # The trigger is posted with GH_PAT, so it arrives authored by the repo OWNER,
    # not github-actions[bot] — accept both so the review actually fires.
    if: >-
      ${{
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '[AUTOMATED-FINAL-REVIEW]') &&
        (
          github.event.comment.user.login == 'github-actions[bot]' ||
          github.event.comment.author_association == 'OWNER'
        )
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: claude-final-review-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Get PR head ref
        id: pr
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_ref', pr.data.head.ref);

      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude final review
        uses: anthropics/claude-code-action@4eaab9b1bbfbbf62abf34216270d6002ab02915c # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          show_full_output: "true"
          # 5 turns wasn't enough to diff the branch, read the changed files, and
          # post the verdict — the run hit the turn limit and errored before it
          # could comment, so no "Ready to merge" ever appeared. Give it room.
          # Allowed tools now live in claude_args: the top-level `allowed_tools`
          # input was removed in this action version and was silently ignored.
          claude_args: >-
            --max-turns 20
            --allowedTools "Bash,Glob,Grep,LS,Read,mcp__github_comment__update_claude_comment"

      - name: Remove full-review label
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'coderabbit-full-reviewed',
              });
            } catch (e) {}
